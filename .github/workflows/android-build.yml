name: Build ARM64 APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build KernelCrafter ARM64 APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build
        env:
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}

      - name: Add Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Generate signing keystore
        working-directory: android/app
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias kernelcrafter \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=KernelCrafter, OU=App, O=KernelCrafter, L=Unknown, ST=Unknown, C=US"
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Release APK (arm64-v8a)
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --info
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: kernelcrafter
          KEY_PASSWORD: android

      - name: Locate and rename APK
        run: |
          mkdir -p dist
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" dist/KernelCrafter-arm64-v8a.apk
          echo "APK built: $(du -h dist/KernelCrafter-arm64-v8a.apk)"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelCrafter-arm64-APK
          path: dist/KernelCrafter-arm64-v8a.apk
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KernelCrafter-arm64-v8a.apk
          generate_release_notes: true
